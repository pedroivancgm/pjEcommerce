default: &default
  adapter: postgresql
  encoding: unicode
  username: postgres
  password: .
  host: 127.0.0.1
  port: 5432
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: ecommerce_backend_development

test:
  <<: *default
  database: ecommerce_backend_test